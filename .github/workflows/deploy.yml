name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Resolve build environment
        shell: bash
        run: |
          set -euo pipefail

          pick_non_empty() {
            for value in "$@"; do
              if [ -n "${value// }" ]; then
                printf '%s' "$value"
                return 0
              fi
            done
            return 1
          }

          STDB_URI="$(pick_non_empty "${{ secrets.VITE_STDB_URI }}" "${{ vars.VITE_STDB_URI }}" "wss://maincloud.spacetimedb.com")"
          AUTH_CLIENT_ID="$(pick_non_empty \
            "${{ secrets.VITE_STDB_AUTH_CLIENT_ID }}" \
            "${{ secrets.VITE_STDB_CLIENT_ID }}" \
            "${{ vars.VITE_STDB_AUTH_CLIENT_ID }}" \
            "${{ vars.VITE_STDB_CLIENT_ID }}" \
          || true)"

          if [ -z "${AUTH_CLIENT_ID}" ]; then
            echo "::error::Missing SpacetimeAuth client ID. Set one of: secrets/vars VITE_STDB_AUTH_CLIENT_ID or VITE_STDB_CLIENT_ID."
            exit 1
          fi

          echo "VITE_STDB_URI=${STDB_URI}" >> "$GITHUB_ENV"
          echo "VITE_STDB_AUTH_CLIENT_ID=${AUTH_CLIENT_ID}" >> "$GITHUB_ENV"
          echo "VITE_STDB_CLIENT_ID=${AUTH_CLIENT_ID}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build
        working-directory: client

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
